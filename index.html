<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Professional Identity</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="Hero">
        <div class="container">
            <p class="hero-subtitle">Build the Web & Edit the Vision</p>
            <h1 class="hero-title">Creative Developer</h1>
            <div class="hero-img-container">
                <img src="hero logo.png" alt="Professional Identity">
            </div>
            <button class="btn btn-custom" onclick="alert('I\'m ready to talk business!')">Let's Talk Business</button>
        </div>
    </section>

    <section class="Skills-Section">
    <div class="container">
        
        <h2 class="section-title">Web Development</h2>
        <div class="web-grid">
            <div class="skill-box">HTML5</div>
            <div class="skill-box">CSS3</div>
            <div class="skill-box">JavaScript</div>
            <div class="skill-box">Bootstrap</div>
            <div class="skill-box">React.js</div>
        </div>

        <hr class="section-divider">

        <h2 class="section-title">Video Editing Vision</h2>
        <div class="stair-grid">
            <div class="stair-card v-1">Adobe Premiere</div>
            <div class="stair-card v-2">After Effects</div>
            <div class="stair-card v-3">Color Grading</div>
            <div class="stair-card v-4">Sound Design</div>
        </div>

    </div>
</section>


</body>
<footer class="footer">
    <div class="container">
        <p>&copy; 2026 Yousef Mohamed. All rights reserved.</p>
    </div>
</footer>
</html>
